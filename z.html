<main class="main-content">
        <div class="booking-container">
            <h2 class="title">Secure Your Stay</h2>
            <p class="subtitle" id="bookingSubtitle">Complete your reservation details below.</p>

            <div id="errorAlert" class="error-alert"></div>

            <form id="bookingForm" class="booking-form">
                
                <section class="form-section">
                    <h3>1. Stay Details</h3>
                    <div class="grid-2col">
                        <div class="input-group">
                            <label for="checkIn">Check-in Date</label>
                            <input type="date" id="checkIn" required>
                        </div>
                        <div class="input-group">
                            <label for="checkOut">Check-out Date</label>
                            <input type="date" id="checkOut" required>
                        </div>
                    </div>

                    <div class="grid-2col">
                        <div class="input-group">
                            <label for="roomType">Selected Room Type</label>
                            <select id="roomType">
                                <option value="standard">Standard Room (₦25,000/night)</option>
                                <option value="deluxe">Deluxe Suite (₦50,000/night)</option>
                                <option value="luxury">Luxury Suite (₦100,000/night)</option>
                                <option value="executive">Executive Penthouse (₦200,000/night)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="guests">Number of Guests</label>
                            <input type="number" id="guests" min="1" max="6" value="1" required>
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <h3>2. Guest Contact Information</h3>
                    <div class="grid-2col">
                        <div class="input-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="input-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="grid-2col">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="input-group">
                            <label for="confirmEmail">Re-type Email</label>
                            <input type="email" id="confirmEmail" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="phone">Contact Phone</label>
                        <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                    </div>
                </section>

                <section class="form-section">
                    <h3>3. Select Payment Method</h3>
                    <div class="payment-options">
                        <label class="radio-label">
                            <input type="radio" name="paymentMethod" value="card" checked>
                            Credit / Debit Card
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="paymentMethod" value="paypal">
                            PayPal
                        </label>
                    </div>
                </section>

                <section class="form-section summary-section">
                    <div class="summary-details">
                        <p>Calculated Stay: <strong id="stayNights">0 Nights</strong></p>
                        <div class="total-display">
                            <span>Amount Due:</span>
                            <span class="price-tag" id="amountDue">₦0</span>
                        </div>
                    </div>

                    <div class="terms-group">
                        <input type="checkbox" id="acceptTerms" required>
                        <label for="acceptTerms">
                            I agree to the Grand Hotel Terms and Conditions and cancellation policies.
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">Complete Order</button>
                </section>
            </form>
        </div>

 <script>
        const ROOM_PRICES = {
            standard: { name: "Standard Room", price: 25000 },
            deluxe: { name: "Deluxe Suite", price: 50000 },
            luxury: { name: "Luxury Suite", price: 100000 },
            executive: { name: "Executive Penthouse", price: 200000 }
        };

        const checkInInput = document.getElementById('checkIn');
        const checkOutInput = document.getElementById('checkOut');
        const roomTypeSelect = document.getElementById('roomType');
        const bookingSubtitle = document.getElementById('bookingSubtitle');
        const stayNightsDisplay = document.getElementById('stayNights');
        const amountDueDisplay = document.getElementById('amountDue');
        const errorAlert = document.getElementById('errorAlert');
        const bookingForm = document.getElementById('bookingForm');

        function setupDateRestrictions() {
            const today = new Date().toISOString().split('T')[0];
            checkInInput.min = today;
            
            checkInInput.addEventListener('change', () => {
                if (checkInInput.value) {
                    checkOutInput.min = checkInInput.value;
                    if (checkOutInput.value && checkOutInput.value <= checkInInput.value) {
                        checkOutInput.value = '';
                    }
                }
                updatePrice();
            });
        }

        function initializeRoomFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');

            let selectedRoom = 'standard';
            if (roomParam && ROOM_PRICES[roomParam.toLowerCase()]) {
                selectedRoom = roomParam.toLowerCase();
            }

            roomTypeSelect.value = selectedRoom;
            updateSubtitle(selectedRoom);
        }

        function updateSubtitle(roomKey) {
            const roomInfo = ROOM_PRICES[roomKey];
            bookingSubtitle.textContent = `You are reserving our ${roomInfo.name}.`;
        }

        function updatePrice() {
            const checkInDate = checkInInput.value;
            const checkOutDate = checkOutInput.value;
            const selectedRoom = roomTypeSelect.value;

            hideError();
            updateSubtitle(selectedRoom);

            if (checkInDate && checkOutDate) {
                const start = new Date(checkInDate);
                const end = new Date(checkOutDate);

                const diffTime = end.getTime() - start.getTime();
                const nights = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (nights > 0) {
                    const pricePerNight = ROOM_PRICES[selectedRoom].price;
                    const totalCost = nights * pricePerNight;

                    stayNightsDisplay.textContent = `${nights} Night${nights > 1 ? 's' : ''}`;
                    amountDueDisplay.textContent = `₦${totalCost.toLocaleString()}`;
                } else {
                    stayNightsDisplay.textContent = '0 Nights';
                    amountDueDisplay.textContent = '₦0';
                    showError('Check-out date must be after the Check-in date.');
                }
            } else {
                stayNightsDisplay.textContent = '0 Nights';
                amountDueDisplay.textContent = '₦0';
            }
        }

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideError() {
            errorAlert.style.display = 'none';
        }

        // Event Listeners
        roomTypeSelect.addEventListener('change', updatePrice);
        checkOutInput.addEventListener('change', updatePrice);

        // Run Setup
        setupDateRestrictions();
        initializeRoomFromURL();
        updatePrice();

        bookingForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const confirmEmail = document.getElementById('confirmEmail').value;
            
            if (email !== confirmEmail) {
                showError('Emails do not match. Please verify your email.');
                return;
            }

            const start = new Date(checkInInput.value);
            const end = new Date(checkOutInput.value);
            if (end <= start) {
                showError('Please adjust your stay dates before completing your order.');
                return;
            }

            hideError();

            const firstName = document.getElementById('firstName').value;
            const roomName = ROOM_PRICES[roomTypeSelect.value].name;
            alert(`Thank you, ${firstName}! Your order for the ${roomName} has been completed successfully.`);
        });

            const roomParam = urlParams.get('room');

            // 2. Find the input fields on your booking page
            const checkInInput = document.getElementById('checkIn');   
            const checkOutInput = document.getElementById('checkOut'); 
            const roomSelect = document.getElementById('roomType');    

            // 3. Automatically drop the dates into the inputs if they exist
            if (checkInParam) {
                checkInInput.value = checkInParam;
            }
            if (checkOutParam) {
                checkOutInput.value = checkOutParam;
            }
            if (roomParam && roomSelect) {
                roomSelect.value = roomParam;
            }

            // 4. Trigger your price calculation immediately so the user sees the total right away
            if (typeof updatePrice === 'function') {
                updatePrice(); 
            }
        });
    </script>
