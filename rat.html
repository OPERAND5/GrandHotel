<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Secure Your Stay | The Grand Hotel</title>
    <style>
        /* Essential structure styles */
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f6f4f0; color: #3a312e; margin: 0; padding: 0; width: 100%; }
        
        .main-content { width: 100%; padding: 4rem 1rem; }
        .booking-container { max-width: 750px; margin: 0 auto; padding: 2.5rem; background-color: #ffffff; border-radius: 12px; box-shadow: 0 20px 40px rgba(44, 34, 30, 0.04); border: 1px solid #e8e4de; }
        
        /* Your specific design styling */
        .title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #2c221e; text-align: center; margin-bottom: 2.5rem; }
        .form-section { border-bottom: 1px solid #e8e4de; padding-bottom: 2rem; margin-bottom: 2rem; }
        .form-section h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #2c221e; border-left: 4px solid #cca43b; padding-left: 0.75rem; margin-bottom: 1.25rem; }
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .input-group label { font-size: 0.75rem; font-weight: 800; color: #2c221e; text-transform: uppercase; }
        .input-group input, .input-group select { padding: 0.8rem; border: 1.5px solid #e8e4de; border-radius: 6px; font-size: 1rem; }
        
        .summary-section { background-color: #fdfbf7; padding: 2.2rem; border-radius: 8px; border: 1px solid rgba(204, 164, 59, 0.3); }
        .total-display { text-align: right; border-right: 4px solid #cca43b; padding-right: 1.5rem; }
        .price-tag { font-size: 3.2rem; font-weight: 900; color: #2c221e; line-height: 1; letter-spacing: -2px; }
        .submit-btn { width: 100%; padding: 1.2rem; background-color: #2c221e; color: #ffffff; border: none; border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar">
      <div class="nav-logo"><a href="index.html">THE GRAND<span>HOTEL</span></a></div>
      <div class="nav-menu">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="room.html">Rooms</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="booking.html" class="btn-book">Book Now</a>
      </div>
    </nav>

    <main class="main-content">
        <div class="booking-container">
            <h2 class="title">Secure Your Stay</h2>
            <form id="bookingForm">
                <section class="form-section">
                    <h3>1. Stay Details</h3>
                    <div class="grid-2col">
                        <div class="input-group"><label>Check-in</label><input type="date" id="checkIn" required></div>
                        <div class="input-group"><label>Check-out</label><input type="date" id="checkOut" required></div>
                    </div>
                    <div class="input-group">
                        <label>Room Type</label>
                        <select id="roomType">
                            <option value="25000">Standard (₦25,000/night)</option>
                            <option value="50000">Deluxe (₦50,000/night)</option>
                            <option value="100000">Luxury (₦100,000/night)</option>
                            <option value="200000">Executive (₦200,000/night)</option>
                        </select>
                    </div>
                </section>

                <section class="form-section">
                    <h3>2. Guest Details</h3>
                    <div class="grid-2col">
                        <div class="input-group"><label>First Name</label><input type="text" required></div>
                        <div class="input-group"><label>Last Name</label><input type="text" required></div>
                    </div>
                    <div class="input-group"><label>Email Address</label><input type="email" id="email" required></div>
                    <div class="input-group"><label>Re-confirm Email</label><input type="email" id="emailConfirm" required></div>
                </section>


                <section class="form-section">
    <h3>3. Payment Method</h3>
    <div style="display:flex; gap: 1.5rem; margin-bottom: 1.5rem;">
        <label style="cursor:pointer; font-weight: 600;">
            <input type="radio" name="pay" value="card" checked> Card Payment
        </label>
        <label style="cursor:pointer; font-weight: 600;">
            <input type="radio" name="pay" value="paypal"> PayPal
        </label>
    </div>
</section>

                <section class="summary-section">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <p>Total for <span id="stayNights">0</span> nights:</p>
                        <div class="total-display">
                            <span style="font-weight:900; text-transform:uppercase; display:block; margin-bottom:0.2rem;">Amount Due</span>
                            <span class="price-tag" id="amountDue">₦0</span>
                        </div>
                    </div>
                    <label style="display:block; margin-top:1rem; font-size:0.8rem;">
                        <input type="checkbox" required> I agree to the Terms and Conditions.
                    </label>
                    <button type="submit" class="submit-btn">Complete Order</button>
                </section>

            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-column"><h2>THE GRAND<span>HOTEL</span></h2></div>
            <div class="footer-column"><h3>Customer Service</h3></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 The Grand Hotel. All rights reserved.</p></div>
    </footer>

    <script>
        const form = document.getElementById('bookingForm');
        const checkIn = document.getElementById('checkIn');
        const checkOut = document.getElementById('checkOut');
        const roomType = document.getElementById('roomType');
        const email = document.getElementById('email');
        const emailConfirm = document.getElementById('emailConfirm');
        const amountDue = document.getElementById('amountDue');
        const stayNights = document.getElementById('stayNights');

        function updatePrice() {
            const start = new Date(checkIn.value);
            const end = new Date(checkOut.value);
            const nights = Math.max(0, Math.ceil((end - start) / (1000 * 60 * 60 * 24)));
            stayNights.textContent = nights;
            amountDue.textContent = `₦${(nights * parseInt(roomType.value)).toLocaleString()}`;
        }
        
        [checkIn, checkOut, roomType].forEach(el => el.addEventListener('change', updatePrice));

        form.addEventListener('submit', function(e) {
            if (email.value !== emailConfirm.value) {
                e.preventDefault();
                alert("Emails do not match. Please re-enter.");
            }
        });
    </script>
</body>
</html>
